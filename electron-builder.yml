appId: com.ailis.desktop
productName: AILIS
artifactName: ${productName}-${version}-${arch}.${ext}
icon: build/icon.png
directories:
  output: F:/AILIS/Build/AILIS
files:
  - dist/**/*
  - electron/**/*
  - scripts/mcp-ailis-research-server.cjs
  - scripts/ailis-crawl4ai-worker.py
  - package.json
extraResources:
  - from: Resources/speech-models
    to: speech-models
  - from: build-cache/openclaw-runtime
    to: openclaw-runtime
  - from: build-cache/openclaw-vendor
    to: openclaw-vendor
  - from: build-cache/ailis-web-runtime
    to: ailis-web-runtime
  - from: build-cache/ailis-asr-runtime
    to: ailis-asr-runtime
extraMetadata:
  main: electron/main.cjs
asar: true
asarUnpack:
  - electron/**/*.cjs
  - electron/**/*.py
  - scripts/**/*.cjs
  - scripts/**/*.py
npmRebuild: false
win:
  icon: build/icon.ico
  executableName: AILIS
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  artifactName: ${productName}-Setup-${version}-win-${arch}.${ext}
portable:
  artifactName: ${productName}-Portable-${version}-win-${arch}.${ext}
linux:
  icon: build/icon.png
  executableName: ailis
  category: Utility
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64
appImage:
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
deb:
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
